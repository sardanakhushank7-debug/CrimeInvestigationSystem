<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Case | Crime Investigation System</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
 
  <header class="top-header">
<div class="logo-area">
<h1>Crime Investigation System</h1>
<p>Add Case Record</p>
</div>
 
    <div class="agent-info">
<p>Welcome, Agent Shadow Hawk</p>
<a href="dashboard.html">Dashboard</a>
<a href="login.html">Logout</a>
</div>
</header>
 
  <nav class="sidebar">
<ul>
<li><a href="dashboard.html">Dashboard</a></li>
<li><a href="cases.html">Cases</a></li>
<li><a href="add-suspect.html">Suspects</a></li>
<li><a href="add-evidence.html">Evidence</a></li>
<li><a href="officers.html">Officers</a></li>
<li><a href="settings.html">Settings</a></li>
</ul>
</nav>
 
  <main class="form-page">
<section class="form-box">
<header class="form-header">
<h2>Add New Case</h2>
<p>Enter case details into the investigation system</p>
</header>
 
      <form id="addCaseForm" action="#" method="post" enctype="multipart/form-data">
 
        <div class="input-group">
<label for="caseId">Case ID</label>
<input type="text" id="caseId" name="caseId" placeholder="Enter case ID" required>
</div>
 
        <div class="input-group">
<label for="caseTitle">Case Title</label>
<input type="text" id="caseTitle" name="caseTitle" placeholder="Enter case title" required>
</div>
 
        <div class="input-group">
<label for="crimeType">Crime Type</label>
<select id="crimeType" name="crimeType" required>
<option value="">Select crime type</option>
<option value="robbery">Robbery</option>
<option value="murder">Murder</option>
<option value="fraud">Fraud</option>
<option value="kidnapping">Kidnapping</option>
<option value="cybercrime">Cybercrime</option>
<option value="arson">Arson</option>
<option value="other">Other</option>
</select>
</div>
 
        <div class="input-group">
<label for="caseStatus">Case Status</label>
<select id="caseStatus" name="caseStatus" required>
<option value="">Select status</option>
<option value="open">Open</option>
<option value="under-investigation">Under Investigation</option>
<option value="closed">Closed</option>
<option value="cold-case">Cold Case</option>
</select>
</div>
 
        <div class="input-group">
<label for="priorityLevel">Priority Level</label>
<select id="priorityLevel" name="priorityLevel" required>
<option value="">Select priority level</option>
<option value="low">Low</option>
<option value="medium">Medium</option>
<option value="high">High</option>
<option value="critical">Critical</option>
</select>
</div>
 
        <div class="input-group">
<label for="assignedAgent">Assigned Agent</label>
<input type="text" id="assignedAgent" name="assignedAgent" placeholder="Enter assigned agent name or ID" required>
</div>
 
        <div class="input-group">
<label for="caseLocation">Case Location</label>
<input type="text" id="caseLocation" name="caseLocation" placeholder="Enter case location" required>
</div>
 
        <div class="input-group">
<label for="reportedDate">Reported Date</label>
<input type="date" id="reportedDate" name="reportedDate" required>
</div>
 
        <div class="input-group">
<label for="caseImage">Case Image</label>
<input type="file" id="caseImage" name="caseImage" accept="image/*">
</div>
 
        <div class="input-group">
<label for="caseDescription">Case Description</label>
<textarea id="caseDescription" name="caseDescription" rows="5" placeholder="Enter case description" required></textarea>
</div>
 
        <div class="form-actions">
<button type="submit">Save Case</button>
<button type="reset">Clear Form</button>
</div>
 
      </form>
</section>
</main>
 
  <footer class="dashboard-footer">
<p>Crime Investigation System</p>
</footer>
 
  <script src="js/script.js"></script>
</body>
</html>
